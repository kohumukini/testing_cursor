services: 
  db: 
    image: postgres:18
    container_name: postgres_db
    restart: unless-blocked
    env_file: .env
    environment: 
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend: 
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_fastapi
    restart: unless_stopped
    env_file: .env
    ports: 
      - "8000:8000"
    depends_on: 
      db: 
        conditions: service_healthy

  frontend: 
    build: ./frontend
    container_name: frontend_react
    ports: 
      - "3000:3000"
    develop: 
      watch: 
        - action: sync
          path: ./frontend
          target: /app
    depends_on: 
      - backend

  volumes: 
    postgres_data: 