services: 
  db: 
    image: postgres:latest
    container_name: postgres_db
    restart: unless-stopped
    env_file: ./.env
    environment: 
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend: 
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: backend_fastapi
    restart: unless-stopped
    env_file: ./.env
    environment: 
      - IS_DOCKER=true
    ports: 
      - "8000:8000"
    depends_on: 
      db: 
        condition: service_healthy

  frontend: 
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend_react
    stdin_open: true
    tty: true
    ports: 
      - "3000:5173"
    develop: 
      watch: 
        - action: sync
          path: ../frontend
          target: /app
          ignore: 
            - node_modules
            - .git
            - dist
    depends_on: 
      - backend

volumes: 
  postgres_data:
